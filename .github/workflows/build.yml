name: Build PrivShield

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PrivShield
        uses: actions/checkout@v4

      - name: Clone RethinkDNS source
        run: |
          git clone https://github.com/celzero/rethink-app rethink
          cp -r rethink/. .
          rm -rf rethink

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleWebDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PrivShield-debug
          path: app/build/outputs/apk/web/debug/*.apk
