name: Build PrivShield

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  build:
    name: Build PrivShield APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout PrivShield
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone RethinkDNS source
        run: |
          git clone --depth=1 https://github.com/celzero/rethink-app rethink
          rsync -a --ignore-existing rethink/ .
          rm -rf rethink

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties','**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Remove Firebase
        run: bash .github/scripts/remove_firebase.sh

      - name: Apply PrivShield patches
        run: bash .github/scripts/apply_patches.sh

      - name: Harden network security
        run: bash .github/scripts/harden_nsc.sh

      - name: Build debug APK
        run: |
          ./gradlew assembleWebsiteFullDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC" \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Verify APK is Firebase-clean
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          echo "APK size: $(du -sh "$APK" | cut -f1)"
          unzip -t "$APK" > /dev/null && echo "APK structure valid"
          if unzip -l "$APK" | grep -q "com/google/firebase"; then
            echo "ERROR: Firebase still in APK"
            exit 1
          fi
          echo "Firebase-clean confirmed"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PrivShield-debug-${{ github.sha }}
          path: app/build/outputs/apk/websiteFull/debug/*.apk
          retention-days: 7
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.sha }}
          path: |
            app/build/reports/
            build/reports/
          retention-days: 3
```

