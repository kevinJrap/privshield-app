name: Build PrivShield
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  actions: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Clone RethinkDNS
        run: |
          git clone --depth=1 https://github.com/celzero/rethink-app rethink
          rsync -a --ignore-existing rethink/ .
          rm -rf rethink
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: gradle/actions/wrapper-validation@v4
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - name: Remove Firebase
        run: bash .github/scripts/remove_firebase.sh
      - name: Apply patches
        run: bash .github/scripts/apply_patches.sh
      - name: Harden NSC
        run: bash .github/scripts/harden_nsc.sh
      - name: Build APK
        run: ./gradlew assembleWebsiteFullDebug --no-daemon --warning-mode all
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
      - uses: actions/upload-artifact@v4
        with:
          name: PrivShield-debug-${{ github.sha }}
          path: app/build/outputs/apk/websiteFull/debug/*.apk
          retention-days: 7
          if-no-files-found: error
